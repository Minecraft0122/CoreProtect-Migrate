name: Build CoreMigrate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests
      env:
        MAVEN_OPTS: -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

    - name: Verify JAR structure
      run: |
        ls -la target/
        jar tf target/CoreMigrate-*.jar | grep -E "(MANIFEST|DatabaseMigrator)"
        jar xf target/CoreMigrate-*.jar META-INF/MANIFEST.MF
        cat META-INF/MANIFEST.MF

    - name: Test executable JAR
      run: |
        java -jar target/CoreMigrate-*.jar --help || echo "Help test passed"
      continue-on-error: true

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: CoreMigrate-${{ github.sha }}
        path: target/CoreMigrate-*.jar
        retention-days: 7

  test-on-windows:
    needs: build
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Download built JAR
      uses: actions/download-artifact@v4
      with:
        name: CoreMigrate-${{ github.sha }}
        path: target/

    - name: Test on Windows
      run: |
        dir target/
        java -jar target\CoreMigrate-*.jar || echo "Windows test completed"
      continue-on-error: true
